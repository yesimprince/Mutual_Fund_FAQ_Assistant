<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HDFC Mutual Fund FAQ Assistant — Get factual answers about expense ratios, exit loads, SIP details, and more.">
    <meta name="theme-color" content="#0a0e1a">

    <title>HDFC Mutual Fund FAQ Assistant</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ================================================================ -->
    <!-- Header                                                           -->
    <!-- ================================================================ -->
    <header class="header" id="app-header">
        <div class="header__inner">
            <div class="header__brand">
                <span class="header__icon">🏦</span>
                <h1 class="header__title">HDFC Mutual Fund FAQ Assistant</h1>
            </div>
            <div class="header__status" id="rate-status" title="Groq API rate limit usage">
                <span class="header__status-dot"></span>
                <span class="header__status-text" id="rate-status-text">--/-- RPM</span>
            </div>
        </div>
    </header>

    <!-- Disclaimer banner -->
    <div class="disclaimer" id="disclaimer-banner">
        <span class="disclaimer__icon">⚠️</span>
        <span class="disclaimer__text">Facts only. No investment advice.</span>
    </div>

    <!-- ================================================================ -->
    <!-- Chat Area                                                        -->
    <!-- ================================================================ -->
    <main class="chat" id="chat-area">
        <div class="chat__container" id="chat-container">

            <!-- Welcome card -->
            <div class="welcome" id="welcome-card">
                <div class="welcome__card">
                    <div class="welcome__icon">💬</div>
                    <p class="welcome__text">
                        Welcome! I can help you with <strong>factual information</strong> about HDFC mutual fund schemes — expense ratios, exit loads, SIP details, and more.
                    </p>
                </div>

                <!-- Quick-ask chips -->
                <div class="chips" id="quick-chips">
                    <button class="chip" data-query="What is the expense ratio of HDFC Large Cap Fund?">
                        <span class="chip__icon">📊</span>
                        Expense ratio of HDFC Large Cap
                    </button>
                    <button class="chip" data-query="What is the exit load for HDFC Small Cap Fund?">
                        <span class="chip__icon">🚪</span>
                        Exit load for HDFC Small Cap
                    </button>
                    <button class="chip" data-query="What is the minimum SIP amount for HDFC Mid Cap Fund?">
                        <span class="chip__icon">💰</span>
                        Min SIP for HDFC Mid Cap
                    </button>
                </div>
            </div>

            <!-- Messages will be inserted here dynamically -->

        </div>
    </main>

    <!-- ================================================================ -->
    <!-- Input Bar                                                        -->
    <!-- ================================================================ -->
    <footer class="input-bar" id="input-bar">
        <div class="input-bar__inner">
            <div class="input-bar__field-wrap">
                <textarea
                    class="input-bar__textarea"
                    id="query-input"
                    placeholder="Ask about any HDFC mutual fund scheme..."
                    rows="1"
                    maxlength="500"
                    aria-label="Type your question"
                ></textarea>
                <span class="input-bar__char-count" id="char-count">0/500</span>
            </div>
            <button class="input-bar__send" id="send-btn" title="Send message" aria-label="Send">
                <span class="input-bar__send-text">Send</span>
                <svg class="input-bar__send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="app.js"></script>
</body>
</html>
